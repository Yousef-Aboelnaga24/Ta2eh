<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تقديم بلاغ مفقود</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="../CSS/report.css">
  <link rel="stylesheet" href="../CSS/forAll.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand" href="#"><img src="../Image/logo.png" alt="" class="logo"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
        <ul class="navbar-nav mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link text-white" href="../index.html"><i class="fa fa-home"></i>
              الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="./search.html"><i class="fa fa-children"></i>
              المفقودين</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#"><i class="fa fa-info-circle"></i> من نحن</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#"><i class="fa fa-headset"></i> تواصل معانا</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Form -->
  <div class="container mt-5 mb-5">
    <h2 class="text-center mb-4 text-main fw-bold" style="color: 09906F;">تقديم بلاغ مفقود</h2>
    <form class="bg-white p-4 shadow rounded">
      <div class="mb-3">
        <label for="personName" class="form-label">الاسم الشخص</label>
        <input type="text" class="form-control" id="personName" name="personName">
      </div>
      <div class="mb-3">
        <label for="age" class="form-label">العمر</label>
        <input type="number" class="form-control" id="age" name="age">
      </div>
      <div class="mb-3">
        <label for="personImage" class="form-label">ارفع صورة للشخص</label>
        <input type="file" class="form-control" id="personImage" name="personImage" accept="/image">
      </div>
      <div class="mb-3">
        <label for="lastSeen" class="form-label">آخر مكان شوهد فيه</label>
        <input type="text" class="form-control" id="lastSeen" name="lastSeen">
      </div>
      <div class="mb-3">
        <label for="details" class="form-label">تفاصيل إضافية (ملابس، وقت الفقد، ملاحظات)</label>
        <textarea class="form-control" id="details" name="details" rows="3"></textarea>
      </div>
      <div class="mb-3">
        <label for="phoneNumber" class="form-label">رقم الهاتف للتواصل</label>
        <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber">
      </div>
      <div class="mb-4">
        <label for="reporterName" class="form-label">اسم المُبلغ</label>
        <input type="text" class="form-control" id="reporterName" name="reporterName">
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-main text-white">إرسال البلاغ</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
