<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تقديم بلاغ مفقود</title>
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.rtl.min.css" />
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <link rel="stylesheet" href="../CSS/report.css">
  <link rel="stylesheet" href="../CSS/forAll.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-success">
    <div class="container">
      <a class="navbar-brand" href="#"><img src="../Image/logo.png" alt="logo" class="logo"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-3">
          <li class="nav-item">
            <a class="nav-link active" href="../index.html">
              <i class="fa fa-home"></i>
              الرئيسية
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./missing.html">
              <i class="fas fa-address-card"></i>
              المفقودين
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./contact.html">
              <i class="fa fa-envelope"></i>
              تواصل معنا
            </a>
          </li>
          <li class="nav-item">
            <a href="./aboutUs.html" class="nav-link">
              <i class="fas fa-users"></i>
              من نحن
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Form -->
  <section>
    <div class="container mt-5 mb-5">
      <h2 class="text-center mb-4 text-main fw-bold" style="color: 09906F;">تقديم بلاغ مفقود</h2>
      <form class="bg-white p-4 shadow rounded">
        <div class="mb-3">
          <label for="personImage" class="form-label">ارفع صورة للشخص</label>
          <input oninput="imgOnly(this)" type="file" class="form-control" id="personImage" name="personImage"
            accept="image/*">
        </div>
        <div class="mb-3">
          <label for="personName" class="form-label">الاسم الشخص</label>
          <input oninput="letterOnly(this)" type="text" class="form-control" id="personName" name="personName">
        </div>
        <div class="mb-3">
          <label for="age" class="form-label">العمر</label>
          <input oninput="numberOnly(this)" type="number" class="form-control" id="age" name="age">
        </div>
        <div class="mb-3">
          <label for="governorate" class="form-label">المحافظة</label>
          <select id="governorate" class="form-select">
            <option value="">اختر المحافظة</option>
            <option value="القاهرة">القاهرة</option>
            <option value="الجيزة">الجيزة</option>
            <option value="الإسكندرية">الإسكندرية</option>
            <option value="الدقهلية">الدقهلية</option>
            <option value="البحر الأحمر">البحر الأحمر</option>
            <option value="البحيرة">البحيرة</option>
            <option value="الفيوم">الفيوم</option>
            <option value="الغربية">الغربية</option>
            <option value="الإسماعيلية">الإسماعيلية</option>
            <option value="المنوفية">المنوفية</option>
            <option value="المنيا">المنيا</option>
            <option value="القليوبية">القليوبية</option>
            <option value="الوادي الجديد">الوادي الجديد</option>
            <option value="السويس">السويس</option>
            <option value="أسوان">أسوان</option>
            <option value="أسيوط">أسيوط</option>
            <option value="بني سويف">بني سويف</option>
            <option value="بورسعيد">بورسعيد</option>
            <option value="دمياط">دمياط</option>
            <option value="الشرقية">الشرقية</option>
            <option value="جنوب سيناء">جنوب سيناء</option>
            <option value="كفر الشيخ">كفر الشيخ</option>
            <option value="مطروح">مطروح</option>
            <option value="الأقصر">الأقصر</option>
            <option value="قنا">قنا</option>
            <option value="شمال سيناء">شمال سيناء</option>
            <option value="سوهاج">سوهاج</option>
          </select>
        </div>


        <div class="mb-3">
          <label for="lastSeen" class="form-label">آخر مكان شوهد فيه</label>
          <input oninput="letterOnly(this)" type="text" class="form-control" id="lastSeen" name="lastSeen">
        </div>
        <div class="mb-3">
          <label for="details" class="form-label">تفاصيل إضافية (ملابس، وقت الفقد، ملاحظات)</label>
          <textarea oninput="letterOnly(this)" class="form-control" id="details" name="details" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label for="phoneNumber" class="form-label">رقم الهاتف للتواصل</label>
          <input oninput="numberOnly(this)" type="tel" class="form-control" id="phoneNumber" name="phoneNumber">
        </div>
        <div class="mb-4">
          <label for="reporterName" class="form-label">اسم المُبلغ</label>
          <input oninput="letterOnly(this)" type="text" class="form-control" id="reporterName" name="reporterName">
        </div>
        <div class="d-grid">
          <button type="submit" id="btn-main" class="btn btn-main text-white">إرسال البلاغ</button>
        </div>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JS/add.js"></script>
</body>

</html>
